name: Build and Release

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: amd64
          - target: aarch64-unknown-linux-musl
            suffix: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          # build.rs embeds version info from git history
          fetch-depth: 0

      - name: Install cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz \
            | sudo tar xz -C /usr/local/bin cross

      - name: Build
        run: cross build --release --bin rumpel --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/rumpel staging/rumpel-linux-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v6
        with:
          name: linux-binaries-${{ matrix.suffix }}
          path: staging/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build darwin-arm64
        run: cargo build --release --bin rumpel --target aarch64-apple-darwin

      - name: Stage binary
        run: |
          mkdir staging
          cp target/aarch64-apple-darwin/release/rumpel staging/rumpel-darwin-arm64

      - uses: actions/upload-artifact@v6
        with:
          name: macos-binaries
          path: staging/

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: linux-binaries-*
          path: staging/
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          name: macos-binaries
          path: staging/

      - name: Create tarball
        run: |
          chmod +x staging/*
          tar -C staging -czf "rumpel-${{ github.ref_name }}.tar.gz" \
            rumpel-linux-amd64 rumpel-linux-arm64 rumpel-darwin-arm64

      - uses: actions/upload-artifact@v6
        with:
          name: release-tarball
          path: "rumpel-${{ github.ref_name }}.tar.gz"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "rumpel-${{ github.ref_name }}.tar.gz" \
            --title "${{ github.ref_name }}" \
            --repo "${{ github.repository }}"
