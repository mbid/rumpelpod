# In-cluster buildkitd for building container images.
#
# rumpelpod connects to buildkitd via port-forward and uses
# docker buildx (remote driver) to build and push images to the
# in-cluster registry.  The builder runs on the master so it is
# always available, even when all worker nodes have scaled to zero.
#
# buildkitd is configured with an insecure registry output so it
# can push to the HTTP-only in-cluster registry at 10.43.0.100:5000.
apiVersion: v1
kind: Namespace
metadata:
  name: buildkit
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: buildkit
data:
  buildkitd.toml: |
    [registry."registry.registry.svc.cluster.local:5000"]
      http = true
    [registry."10.43.0.100:5000"]
      http = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: buildkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
        - key: node-role.kubernetes.io/master
          operator: Exists
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.21.1
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --config
            - /etc/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: buildkit
          securityContext:
            privileged: true
          volumeMounts:
            - name: config
              mountPath: /etc/buildkit
            - name: cache
              mountPath: /var/lib/buildkit
      volumes:
        - name: config
          configMap:
            name: buildkitd-config
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: buildkit
spec:
  selector:
    app: buildkitd
  ports:
    - port: 1234
      targetPort: 1234
