# In-cluster container registry for rumpelpod.
#
# Tests push via kubectl port-forward to the service; pods pull via the
# cluster-internal DNS name, which the registries.yaml mirror on each
# node redirects to the fixed ClusterIP below.
#
# The fixed ClusterIP (10.43.0.100) is routable from every node via
# kube-proxy iptables rules, so containerd can pull images regardless
# of which node the registry pod runs on.
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      # Run on the master so the registry is always available, even when
      # all worker nodes have scaled to zero.
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
        - key: node-role.kubernetes.io/master
          operator: Exists
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
spec:
  clusterIP: 10.43.0.100
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
